name: Auto Release

on:
  push:
    branches:
      - main
      - feature/select-area-and-timer
    paths:
      - 'version.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version from version.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Extract Changelog
        id: get_changelog
        run: |
          # Extract the changes array for the current version and format as a bulleted list
          CHANGELOG=$(jq -r --arg v "$VERSION" '.changelog[] | select(.version == $v) | .changes[] | "- " + .' version.json)
          
          # Use EOF for multi-line GitHub Actions environment variable
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Check if Release Exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.VERSION }}" > /dev/null 2>&1; then
            echo "Release v${{ env.VERSION }} already exists. Skipping build and release."
            echo "skip=true" >> $GITHUB_ENV
          else
            echo "skip=false" >> $GITHUB_ENV
          fi

      - name: Build App (CI Mode)
        if: env.skip == 'false'
        env:
          CI: "true"
        run: |
          chmod +x install-rec.command
          ./install-rec.command

      - name: Zip the App
        if: env.skip == 'false'
        run: |
          # The script builds to 'Build/Rec.app'
          cd Build
          zip -r ../Rec.zip "Rec.app"
          cd ..

      - name: Create Release
        if: env.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.VERSION }}" Rec.zip \
            --title "v${{ env.VERSION }}" \
            --notes "${{ env.CHANGELOG }}" \
            --target "$GITHUB_SHA"

      - name: Calculate SHA256
        if: env.skip == 'false'
        id: calc_sha
        run: |
          SHA256=$(shasum -a 256 Rec.zip | awk '{ print $1 }')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "Computed SHA256: $SHA256"

      - name: Checkout Homebrew Tap
        if: env.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: arunofhyd/homebrew-rec
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-rec

      - name: Update Formula
        if: env.skip == 'false'
        run: |
          cd homebrew-rec
          # Update version
          sed -i '' -e "s/version \".*\"/version \"${{ env.VERSION }}\"/" Casks/rec.rb
          # Update sha256
          sed -i '' -e "s/sha256 \".*\"/sha256 \"${{ env.SHA256 }}\"/" Casks/rec.rb
          
          git diff

      - name: Commit and Push Homebrew Tap
        if: env.skip == 'false'
        run: |
          cd homebrew-rec
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/rec.rb
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Rec to v${{ env.VERSION }}"
            git push
          fi

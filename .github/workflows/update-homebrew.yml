name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: macos-latest
    steps:
      - name: Extract version
        id: get_version
        run: |
          # Remove 'v' prefix if present
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download Release Asset
        run: |
          # Wait a few seconds to ensure the asset is fully available
          sleep 10
          curl -sL "https://github.com/arunofhyd/Rec/releases/download/v${{ env.VERSION }}/Rec.zip" -o Rec.zip

      - name: Calculate SHA256
        id: calc_sha
        run: |
          SHA256=$(shasum -a 256 Rec.zip | awk '{ print $1 }')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "Computed SHA256: $SHA256"

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: arunofhyd/homebrew-rec
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-rec

      - name: Update Formula
        run: |
          cd homebrew-rec
          # Update version
          sed -i '' -e "s/version \".*\"/version \"${{ env.VERSION }}\"/" Casks/rec.rb
          # Update sha256
          sed -i '' -e "s/sha256 \".*\"/sha256 \"${{ env.SHA256 }}\"/" Casks/rec.rb
          
          # Show the diff for debugging
          git diff

      - name: Commit and Push
        run: |
          cd homebrew-rec
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/rec.rb
          
          # Only commit and push if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Rec to v${{ env.VERSION }}"
            git push
          fi
